{% extends "base.html" %}
{% block title %}Mastery Candidates · RA Companion{% endblock %}

{% block content %}
<div class="card">
    <h2>Mastery Candidates</h2>
    <p style="color:var(--text-muted);margin-top:-0.5rem;">Games you're close to mastering. Sorted by fewest remaining achievements.</p>
    <div class="controls">
        <label>Minimum completion:
            <select id="threshold">
                <option value="50">50%+</option>
                <option value="70">70%+</option>
                <option value="80" selected>80%+</option>
                <option value="90">90%+</option>
                <option value="95">95%+</option>
            </select>
        </label>
        <button id="refresh">Refresh</button>
    </div>
</div>
<div id="mastery-root"><div class="loading">Loading…</div></div>
{% endblock %}

{% block scripts %}
<script>
let MASTERY_DATA = null;

function render() {
    const root = document.getElementById('mastery-root');
    if (!MASTERY_DATA) return;
    const data = MASTERY_DATA;
    const softcore = isSoftcore();

    if (!data.count) {
        root.innerHTML = `<div class="card"><div class="empty">No candidates at ${data.threshold}%+ completion.</div></div>`;
        return;
    }

    // Re-sort by the active mode's remaining count
    const candidates = data.candidates.slice().sort((a, b) => {
        const ar = softcore ? a.remaining : a.remaining_hardcore;
        const br = softcore ? b.remaining : b.remaining_hardcore;
        if (ar !== br) return ar - br;
        return (softcore ? b.pct_soft - a.pct_soft : b.pct_hard - a.pct_hard);
    });

    const modeLabel = softcore ? 'SC' : 'HC';
    const secondaryLabel = softcore ? 'HC' : 'SC';

    let html = `<div class="card"><h2>${data.count} game${data.count === 1 ? '' : 's'} within reach <span style="font-weight:400;font-size:0.85rem;color:var(--text-muted);">— sorted by ${modeLabel.toLowerCase()} remaining</span></h2>`;
    html += `<table><thead><tr>
        <th></th><th>Game</th><th>Console</th>
        <th>Progress (${modeLabel})</th>
        <th>${secondaryLabel}</th>
        <th>Remaining</th><th>Last Played</th>
    </tr></thead><tbody>`;

    for (const c of candidates) {
        const icon = c.icon ? `https://retroachievements.org${c.icon}` : '';
        const pctPrimary = softcore ? c.pct_soft : c.pct_hard;
        const pctSecondary = softcore ? c.pct_hard : c.pct_soft;
        const remainingPrimary = softcore ? c.remaining : c.remaining_hardcore;
        const barClass = softcore ? '' : ' hardcore';

        html += `<tr class="clickable-row" data-game-id="${c.game_id}">
            <td>${icon ? `<img src="${icon}" alt="" style="width:40px;height:40px;border-radius:4px;">` : ''}</td>
            <td><strong>${c.title}</strong></td>
            <td>${c.console}</td>
            <td>
                ${pctPrimary}%<div class="progress"><div class="bar${barClass}" style="width:${pctPrimary}%;"></div></div>
            </td>
            <td>
                ${pctSecondary}%<div class="progress"><div class="bar${softcore ? ' hardcore' : ''}" style="width:${pctSecondary}%;"></div></div>
            </td>
            <td><strong>${remainingPrimary}</strong> / ${c.total_achievements}</td>
            <td>${(c.most_recent || '').slice(0,10)}</td>
        </tr>`;
    }

    html += `</tbody></table></div>`;
    root.innerHTML = html;
    wireGameLinks(root);
}

async function loadMastery() {
    const root = document.getElementById('mastery-root');
    root.innerHTML = '<div class="loading">Loading…</div>';
    const threshold = document.getElementById('threshold').value;
    try {
        const r = await fetch(`/api/mastery?threshold=${threshold}`);
        if (!r.ok) {
            const err = await r.json().catch(() => ({error: 'HTTP ' + r.status}));
            throw new Error(err.error || ('HTTP ' + r.status));
        }
        MASTERY_DATA = await r.json();
        render();
    } catch (e) {
        root.innerHTML = `<div class="error">Failed to load: ${e.message}</div>`;
    }
}

document.getElementById('threshold').addEventListener('change', loadMastery);
document.getElementById('refresh').addEventListener('click', loadMastery);
window.addEventListener('progressmodechange', render);
loadMastery();
</script>
{% endblock %}
