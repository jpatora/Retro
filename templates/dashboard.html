{% extends "base.html" %}
{% block title %}Dashboard · RA Companion{% endblock %}

{% block content %}
<div id="dashboard-root">
    <div class="loading">Loading profile…</div>
</div>
{% endblock %}

{% block scripts %}
<script>
let DASHBOARD_DATA = null;

async function loadDashboard() {
    const root = document.getElementById('dashboard-root');
    try {
        const r = await fetch('/api/dashboard');
        if (!r.ok) {
            const err = await r.json().catch(() => ({error: 'HTTP ' + r.status}));
            throw new Error(err.error || ('HTTP ' + r.status));
        }
        DASHBOARD_DATA = await r.json();
        renderDashboard(root, DASHBOARD_DATA);
    } catch (e) {
        root.innerHTML = `<div class="error">Failed to load dashboard: ${e.message}</div>`;
    }
}

function renderDashboard(root, data) {
    const p = data.profile || {};
    const aw = data.awards_summary || {};
    const avatar = p.UserPic ? `https://retroachievements.org${p.UserPic}` : '';

    let html = '';

    // Profile header + companion photo
    html += `<div class="profile-row">
        <div class="card profile-card">
            <div style="display:flex;gap:1.25rem;align-items:center;flex-wrap:wrap;">
                ${avatar ? `<img src="${avatar}" alt="avatar" style="width:80px;height:80px;border-radius:6px;">` : ''}
                <div>
                    <h2 style="border:none;margin:0;">${p.User || ''} ${p.Motto ? `<span style="font-size:0.85rem;color:var(--text-muted);font-weight:normal;">— "${p.Motto}"</span>` : ''}</h2>
                    <div style="color:var(--text-muted);font-size:0.9rem;">${p.RichPresenceMsg || 'Not currently playing'}</div>
                </div>
            </div>
        </div>
        <div class="card companion-card">
            <img src="/static/images/axolotl.jpeg" alt="Axolotl companion" class="companion-img">
            <div class="companion-caption">Gaming buddy</div>
        </div>
    </div>`;

    // Stat tiles — primary Points tile swaps based on active mode
    const softcore = isSoftcore();
    const rank = data.rank;
    const totalRanked = data.total_ranked;

    const primaryPointsLabel = softcore ? 'Points (SC)' : 'Points (HC)';
    const primaryPointsValue = softcore ? (p.TotalSoftcorePoints || 0) : (p.TotalPoints || 0);

    // RetroPoints are only awarded on hardcore unlocks.
    const rpValue = (p.TotalTruePoints || 0);
    const rpTile = softcore
        ? `<div class="stat secondary"><div class="label">RetroPoints</div><div class="value">${rpValue.toLocaleString()}</div><div class="sub">Hardcore only</div></div>`
        : `<div class="stat"><div class="label">RetroPoints</div><div class="value">${rpValue.toLocaleString()}</div></div>`;

    // Rank is also hardcore-only on RA. For softcore players it won't be shown.
    const rankTile = softcore
        ? `<div class="stat secondary"><div class="label">Rank (HC)</div><div class="value">${rank ? '#' + rank.toLocaleString() : '—'}</div><div class="sub">Hardcore only</div></div>`
        : `<div class="stat"><div class="label">Rank</div><div class="value">${rank ? '#' + rank.toLocaleString() : '—'}</div>${totalRanked ? `<div class="sub">of ${totalRanked.toLocaleString()}</div>` : ''}</div>`;

    // Beaten count: show the count matching the active mode
    const beatenCount = softcore ? (aw.beaten_softcore_count || 0) : (aw.beaten_hardcore_count || 0);
    const beatenLabel = softcore ? 'Beaten (SC)' : 'Beaten (HC)';

    // Mastery count is hardcore-only; Completion is the softcore equivalent
    const masteryValue = softcore ? (aw.completion_count || 0) : (aw.mastery_count || 0);
    const masteryLabel = softcore ? 'Completions' : 'Masteries';

    html += `<div class="stat-grid">
        <div class="stat primary"><div class="label">${primaryPointsLabel}</div><div class="value">${primaryPointsValue.toLocaleString()}</div></div>
        ${rpTile}
        ${rankTile}
        <div class="stat"><div class="label">${masteryLabel}</div><div class="value">${masteryValue}</div></div>
        <div class="stat"><div class="label">${beatenLabel}</div><div class="value">${beatenCount}</div></div>
    </div>`;

    // Recent unlocks
    html += `<div class="card">
        <h2>Recent Unlocks (30 days)</h2>`;
    if (!data.recent_unlocks || data.recent_unlocks.length === 0) {
        html += `<div class="empty">No recent unlocks.</div>`;
    } else {
        html += `<ul class="unlock-list">`;
        for (const a of data.recent_unlocks) {
            const badge = badgeImageUrl(a.BadgeURL, a.BadgeName);
            const gid = a.GameID || '';
            html += `<li ${gid ? `class="clickable" data-game-id="${gid}"` : ''}>
                ${badge ? `<img src="${badge}" alt="badge">` : ''}
                <div style="flex:1;min-width:0;">
                    <div class="ach-title">${a.Title || ''}</div>
                    <div class="ach-meta">${a.GameTitle || ''} · ${a.ConsoleName || ''} · ${a.Date || ''}</div>
                </div>
                <span class="ach-points">+${a.Points || 0}</span>
            </li>`;
        }
        html += `</ul>`;
    }
    html += `</div>`;

    // Mastered games
    html += `<div class="card">
        <h2>Recent Masteries</h2>`;
    if (!data.mastered || data.mastered.length === 0) {
        html += `<div class="empty">No masteries to show.</div>`;
    } else {
        html += `<div class="game-list">`;
        for (const m of data.mastered) {
            const icon = m.ImageIcon ? `https://retroachievements.org${m.ImageIcon}` : '';
            const gid = m.AwardData || m.GameID || '';
            html += `<div class="game-card" ${gid ? `data-game-id="${gid}"` : ''}>
                ${icon ? `<img src="${icon}" alt="">` : ''}
                <div class="meta">
                    <div class="title" title="${m.Title || ''}">${m.Title || 'Unknown'}</div>
                    <div class="console">${m.ConsoleName || ''}</div>
                    <div class="stats">${m.AwardType || ''} · ${(m.AwardedAt || '').slice(0,10)}</div>
                </div>
            </div>`;
        }
        html += `</div>`;
    }
    html += `</div>`;

    root.innerHTML = html;
    wireGameLinks(root);
}

loadDashboard();

window.addEventListener('progressmodechange', () => {
    if (DASHBOARD_DATA) {
        renderDashboard(document.getElementById('dashboard-root'), DASHBOARD_DATA);
    }
});
</script>
{% endblock %}
