<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RA Companion{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="{{ url_for('static', filename='js/game_links.js') }}"></script>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="brand">
                <h1>RetroAchievements Companion</h1>
                <span class="user-tag">@{{ username }}</span>
            </div>
            <nav class="site-nav">
                <a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">Dashboard</a>
                <a href="{{ url_for('weekly_report') }}" class="{% if request.endpoint == 'weekly_report' %}active{% endif %}">Weekly</a>
                <a href="{{ url_for('play_tonight') }}" class="{% if request.endpoint == 'play_tonight' %}active{% endif %}">Play Tonight</a>
                <a href="{{ url_for('hunt_tracker') }}" class="{% if request.endpoint == 'hunt_tracker' %}active{% endif %}">Hunt</a>
                <a href="{{ url_for('mastery_candidates') }}" class="{% if request.endpoint == 'mastery_candidates' %}active{% endif %}">Mastery</a>
            </nav>
        </div>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <span>Data from retroachievements.org</span>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
